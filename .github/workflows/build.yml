name: Build GKI Kernel

on:
  workflow_dispatch:
    inputs:
      variant:
        description: 'Kernel Variant'
        required: true
        type: choice
        options:
          - Vanilla
          - KSUN_SUSFS
        default: 'Vanilla'
      release_type:
        description: 'Build Type'
        required: true
        type: choice
        options:
          - CI
          - Release
        default: 'CI'

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex git libssl-dev make zip zstd libelf-dev curl patch

      - name: Allocate Swap Space
        run: |
          sudo dd if=/dev/zero of=/swapfile bs=1M count=10240 status=progress
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Run Builder Script
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          chmod +x build.sh
          ./build.sh "${{ github.event.inputs.variant }}" "${{ github.event.inputs.release_type }}"
